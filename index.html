<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free real estate playbooks powered by AI - lead generation, deal analysis, and more.">
    <title>Real Estate Playbooks</title>
    <link rel="icon" type="image/svg+xml" href="/aidealhunter/favicon.svg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #06060a;
            --bg-card: #10101a;
            --border: #1e1e32;
            --border-accent: rgba(139, 201, 238, 0.3);
            --text: #f0f0f8;
            --text-sec: #9090a8;
            --accent: #8bc9ee;
            --accent-bg: rgba(139, 201, 238, 0.08);
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 80px 24px 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header__logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .header__logo svg {
            stroke: var(--accent);
        }

        .header__title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a8d8f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header__subtitle {
            color: var(--text-sec);
            font-size: 1.1rem;
            margin-top: 8px;
        }

        .playbooks {
            display: grid;
            gap: 20px;
        }

        .playbook-card {
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.3s, transform 0.2s;
        }

        .playbook-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .playbook-card__icon {
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: var(--accent-bg);
            border: 1px solid var(--border-accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playbook-card__icon svg {
            stroke: var(--accent);
        }

        .playbook-card__content {
            flex: 1;
        }

        .playbook-card__badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            background: var(--accent-bg);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .playbook-card__title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .playbook-card__desc {
            color: var(--text-sec);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .playbook-card__arrow {
            flex-shrink: 0;
            color: var(--text-sec);
            transition: color 0.3s, transform 0.3s;
        }

        .playbook-card:hover .playbook-card__arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        .footer {
            text-align: center;
            padding: 40px 24px;
            color: var(--text-sec);
            font-size: 0.8rem;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .container { padding: 48px 16px 40px; }
            .header__title { font-size: 1.5rem; }
            .playbook-card { padding: 20px; gap: 16px; }
            .playbook-card__icon { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header__logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="6"/>
                    <circle cx="12" cy="12" r="2"/>
                </svg>
                <span class="header__title">Real Estate Playbooks</span>
            </div>
            <p class="header__subtitle">Free guides to help you close more deals with AI</p>
        </header>

        <div class="playbooks">
            <a href="/aidealhunter/" class="playbook-card">
                <div class="playbook-card__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                </div>
                <div class="playbook-card__content">
                    <span class="playbook-card__badge">New</span>
                    <h2 class="playbook-card__title">The AI Deal Hunter Playbook</h2>
                    <p class="playbook-card__desc">How smart real estate investors find & prioritize motivated sellers using AI. Includes 7 battle-tested prompts and a priority matrix.</p>
                </div>
                <svg class="playbook-card__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </a>

            <!-- Add more playbook cards here as they're created -->
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 Real Estate Playbooks. All rights reserved.
    </footer>
</body>
</html>
